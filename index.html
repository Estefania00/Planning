        function getEasterDate(year) {
          const a = year % 19;
          const b = Math.floor(year / 100);
          const c = year % 100;
          const d = Math.floor(b / 4);
          const e = b % 4;
          const f = Math.floor((b + 8) / 25);
          const g = Math.floor((b - f + 1) / 3);
          const h = (19 * a + b - d - g + 15) % 30;
          const i = Math.floor(c / 4);
          const k = c % 4;
          const L = (32 + 2 * e + 2 * i - h - k) % 7;
          const m = Math.floor((a + 11 * h + 22 * L) / 451);
          const month = Math.floor((h + L - 7 * m + 114) / 31);
          const day = ((h + L - 7 * m + 114) % 31) + 1;
          return new Date(Date.UTC(year, month - 1, day));
        }

        function getColombianHolidaysWithNames(year) {
          const list = [];
          const emiliani = (date) => {
            const day = date.getUTCDay();
            if (day === 1) return date; // Ya es lunes
            const diff = day === 0 ? 1 : 8 - day;
            const res = new Date(date);
            res.setUTCDate(res.getUTCDate() + diff);
            return res;
          };
          const formatISO = (d) => d.toISOString().split('T')[0];
          
          list.push({ date: formatISO(new Date(Date.UTC(year, 0, 1))), name: "Año Nuevo" });
          list.push({ date: formatISO(new Date(Date.UTC(year, 4, 1))), name: "Día del Trabajo" });
          list.push({ date: formatISO(new Date(Date.UTC(year, 6, 20))), name: "Grito de Independencia" });
          list.push({ date: formatISO(new Date(Date.UTC(year, 7, 7))), name: "Batalla de Boyacá" });
          list.push({ date: formatISO(new Date(Date.UTC(year, 11, 8))), name: "Inmaculada Concepción" });
          list.push({ date: formatISO(new Date(Date.UTC(year, 11, 25))), name: "Navidad" });

          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 0, 6)))), name: "Reyes Magos" });
          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 2, 19)))), name: "San José" });
          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 5, 29)))), name: "San Pedro y San Pablo" });
          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 7, 15)))), name: "Asunción de la Virgen" });
          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 9, 12)))), name: "Día de la Raza" });
          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 10, 1)))), name: "Todos los Santos" });
          list.push({ date: formatISO(emiliani(new Date(Date.UTC(year, 10, 11)))), name: "Independencia de Cartagena" });

          const easter = getEasterDate(year);
          const juevesSanto = new Date(easter);
          juevesSanto.setUTCDate(juevesSanto.getUTCDate() - 3);
          list.push({ date: formatISO(juevesSanto), name: "Jueves Santo" });

          const viernesSanto = new Date(easter);
          viernesSanto.setUTCDate(viernesSanto.getUTCDate() - 2);
          list.push({ date: formatISO(viernesSanto), name: "Viernes Santo" });

          const ascension = new Date(easter);
          ascension.setUTCDate(ascension.getUTCDate() + 43);
          list.push({ date: formatISO(ascension), name: "Ascensión del Señor" });

          const corpus = new Date(easter);
          corpus.setUTCDate(corpus.getUTCDate() + 64);
          list.push({ date: formatISO(corpus), name: "Corpus Christi" });

          const sagradoCorazon = new Date(easter);
          sagradoCorazon.setUTCDate(sagradoCorazon.getUTCDate() + 71);
          list.push({ date: formatISO(sagradoCorazon), name: "Sagrado Corazón" });

          const seen = new Set();
          return list.filter(item => {
            if (seen.has(item.date)) return false;
            seen.add(item.date);
            return true;
          }).sort((a, b) => a.date.localeCompare(b.date));
        }

        function getColombianHolidaysForRange(startStr, endStr) {
          const start = new Date(startStr + 'T00:00:00');
          const end = new Date(endStr + 'T00:00:00');
          if (isNaN(start) || isNaN(end) || start > end) return [];
          const startYear = start.getFullYear();
          const endYear = end.getFullYear();
          
          let allHolidays = [];
          for (let y = startYear; y <= endYear; y++) {
            allHolidays = allHolidays.concat(getColombianHolidaysWithNames(y));
          }
          return allHolidays.filter(h => {
            const hDate = new Date(h.date + 'T00:00:00');
            return hDate >= start && hDate <= end;
          });
        }

        function getNextBusinessDayColombia(dateStr) {
          let current = new Date(dateStr + 'T00:00:00');
          current.setDate(current.getDate() + 1);
          while (true) {
            const year = current.getFullYear();
            const holidays = getColombianHolidaysWithNames(year).map(h => h.date);
            const day = current.getDay();
            const isWeekend = day === 0 || day === 6;
            const currentISO = current.toISOString().split('T')[0];
            const isHoliday = holidays.includes(currentISO);
            
            if (!isWeekend && !isHoliday) return currentISO;
            current.setDate(current.getDate() + 1);
          }
        }

            return count;
          }, [activeSprint]);

          const getNthBusinessDay = (startDateStr, n, holidayList) => {
            if (n <= 0) return startDateStr;
            let currentDate = new Date(startDateStr + 'T00:00:00');
            let count = 0;
            let first = true;
            while (count < n) {
              if (!first) currentDate.setDate(currentDate.getDate() + 1);
              else first = false;
              if (isBusinessDay(currentDate, holidayList)) count++;
            }
            return currentDate.toISOString().split('T')[0];
          };

          const formatFriendlyDate = (dateStr) => {
            if (!dateStr) return 'No definida';
            const date = new Date(dateStr + 'T00:00:00');
            if (isNaN(date)) return dateStr;
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let formatted = date.toLocaleDateString('es-ES', options);
            return formatted.charAt(0).toUpperCase() + formatted.slice(1);
          };

          const calculatedSchedules = useMemo(() => {
            const devResults = {};
            const qaResults = {};

            const resources = activeSprint.resources || [];
            const userStories = activeSprint.userStories || [];
            const devQueues = activeSprint.devQueues || {};
            const qaQueues = activeSprint.qaQueues || {};
            const holidays = activeSprint.holidays || [];

            resources.filter(r => r && r.role === 'DEV').forEach(resource => {
              const queue = devQueues[resource.id] || [];
              const resourceHUs = queue.map(id => userStories.find(hu => hu && hu.id === id)).filter(hu => hu && hu.hasDev);

              let cumulativeHours = 0;
              const startFrom = resource.exceptionStart ? resource.exceptionStart : activeSprint.start;

              resourceHUs.forEach((hu) => {
                const totalDevHours = Object.values(hu.devHours || {}).reduce((a, b) => a + Number(b || 0), 0);
                const prevCumulativeDays = Math.ceil(cumulativeHours / (resource.capacity || 8));
                cumulativeHours += totalDevHours;
                const totalCumulativeDays = Math.ceil(cumulativeHours / (resource.capacity || 8));

                const startDayIndex = prevCumulativeDays + 1;
                const endDayIndex = totalCumulativeDays;

                devResults[hu.id] = {
                  hours: totalDevHours,
                  startDate: getNthBusinessDay(startFrom, startDayIndex, holidays),
                  endDate: getNthBusinessDay(startFrom, endDayIndex, holidays)
                };
              });
            });

            resources.filter(r => r && r.role === 'QA').forEach(resource => {
              const queue = qaQueues[resource.id] || [];
              const resourceHUs = queue.map(id => userStories.find(hu => hu && hu.id === id)).filter(hu => hu && hu.hasQa);

              let cumulativeHours = 0;
              const startFrom = resource.exceptionStart ? resource.exceptionStart : activeSprint.start;

              resourceHUs.forEach((hu) => {
                const totalQaHours = Object.values(hu.qaHours || {}).reduce((a, b) => a + Number(b || 0), 0);
                const prevCumulativeDays = Math.ceil(cumulativeHours / (resource.capacity || 4));
                cumulativeHours += totalQaHours;
                const totalCumulativeDays = Math.ceil(cumulativeHours / (resource.capacity || 4));

                const startDayIndex = prevCumulativeDays + 1;
                const endDayIndex = totalCumulativeDays;

                qaResults[hu.id] = {
                  hours: totalQaHours,
                  startDate: getNthBusinessDay(startFrom, startDayIndex, holidays),
                  endDate: getNthBusinessDay(startFrom, endDayIndex, holidays)
                };
              });
            });

            return { dev: devResults, qa: qaResults };
          }, [activeSprint]);

          const consolidatedStories = useMemo(() => {
            const userStories = activeSprint.userStories || [];
            const dodList = activeSprint.dodList || [];
            
            return userStories.map(hu => {
              if (!hu) return {};
              const devSched = calculatedSchedules.dev[hu.id];
              const qaSched = calculatedSchedules.qa[hu.id];

              const totalDevHours = hu.hasDev ? Object.values(hu.devHours || {}).reduce((a, b) => a + Number(b || 0), 0) : 0;
              const totalQaHours = hu.hasQa ? Object.values(hu.qaHours || {}).reduce((a, b) => a + Number(b || 0), 0) : 0;

              let finalDeliveryDate = '';
              if (hu.hasQa && qaSched) finalDeliveryDate = qaSched.endDate;
              else if (hu.hasDev && devSched) finalDeliveryDate = devSched.endDate;

              const totalDodItems = dodList.length;
              const checkedCount = (hu.dodChecked || []).length;
              const dodProgress = totalDodItems > 0 ? Math.round((checkedCount / totalDodItems) * 100) : 0;

              return {
                ...hu,
                totalDevHours,
                totalQaHours,
                devStartDate: devSched ? devSched.startDate : '',
                devEndDate: devSched ? devSched.endDate : '',
                qaStartDate: qaSched ? qaSched.startDate : '',
                qaEndDate: qaSched ? qaSched.endDate : '',
                finalDeliveryDate,
                dodProgress
              };
            });
          }, [activeSprint, calculatedSchedules]);

          const resourceMetrics = useMemo(() => {
            const resources = activeSprint.resources || [];
            return resources.map(res => {
              if (!res) return {};
              const isDev = res.role === 'DEV';
              const totalCapacityHours = sprintWorkingDays * (res.capacity || 0);

              let requiredHours = 0;
              if (isDev) {
                requiredHours = consolidatedStories
                  .filter(hu => hu && hu.hasDev && hu.devAssigned === res.id)
                  .reduce((sum, hu) => sum + (hu.totalDevHours || 0), 0);
              } else {
                requiredHours = consolidatedStories
                  .filter(hu => hu && hu.hasQa && hu.qaAssigned === res.id)
                  .reduce((sum, hu) => sum + (hu.totalQaHours || 0), 0);
              }

              const balanceHours = totalCapacityHours - requiredHours;
              const occupationPercent = totalCapacityHours > 0 ? (requiredHours / totalCapacityHours) * 100 : 0;

              let statusText = 'Con disponibilidad';
              let statusColor = 'bg-emerald-100 text-emerald-800 border-emerald-300';
              let progressColor = 'bg-emerald-500';

              if (occupationPercent === 100) {
                statusText = 'Al límite (0 dispo)';
                statusColor = 'bg-amber-100 text-amber-800 border-amber-300';
                progressColor = 'bg-amber-500';
              } else if (occupationPercent > 100) {
                statusText = 'Sobrecargado';
                statusColor = 'bg-rose-100 text-rose-800 border-rose-300';
                progressColor = 'bg-rose-500';
              }

              return {
                ...res,
                totalCapacityHours,
                requiredHours,
                balanceHours,
                occupationPercent,
                statusText,
                statusColor,
                progressColor
              };
            });
          }, [activeSprint, consolidatedStories, sprintWorkingDays]);

          const parseWorkbookData = (workbook, originName = 'Excel') => {
            try {
              const sheetNamesLower = workbook.SheetNames.map(n => n.toLowerCase());
              
              // Determinar si es un reporte parcial (DEV o QA) o una base de datos unificada completa
              const isDevOnly = sheetNamesLower.some(n => n.includes('horas_dev') || n === 'dev') && !sheetNamesLower.some(n => n.includes('capacidad') || n.includes('balance'));
              const isQaOnly = sheetNamesLower.some(n => n.includes('horas_qa') || n === 'qa') && !sheetNamesLower.some(n => n.includes('capacidad') || n.includes('balance'));

              if (isDevOnly || isQaOnly) {
                addLog(`Se detectó reporte parcial de ${isDevOnly ? 'Desarrollo (DEV)' : 'Aseguramiento (QA)'}. Iniciando fusión inteligente...`);
                let countMerged = 0;

                const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('dev') || n.toLowerCase().includes('qa'));
                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);

                setSprints(prev => {
                  const updatedSprints = { ...prev };
                  if (!updatedSprints[activeSprintId]) return prev;
                  
                  const targetSprint = { ...updatedSprints[activeSprintId] };
                  if (!Array.isArray(targetSprint.userStories)) targetSprint.userStories = [];

                  rows.forEach(row => {
                    const id = String(row['ID HU'] || row['ID'] || '').trim();
                    if (!id) return;

                    const story = targetSprint.userStories.find(hu => hu && hu.id === id);
                    if (story) {
                      // ASIGNACIÓN RESILIENTE: Busca coincidencia por ID numérico de recurso o nombre
                      const assignedCell = row['ID DEV Asignado'] || row['ID QA Asignado'] || row['Desarrollador Asignado'] || row['Asegurador Asignado'] || '';
                      let targetResId = '';
                      
                      if (assignedCell) {
                        const cleanCell = String(assignedCell).trim();
                        const matchById = (targetSprint.resources || []).find(r => String(r.id) === cleanCell);
                        if (matchById) {
                          targetResId = matchById.id;
                        } else {
                          const matchByName = (targetSprint.resources || []).find(r => r.name.toLowerCase().includes(cleanCell.toLowerCase()) || cleanCell.toLowerCase().includes(r.name.toLowerCase()));
                          if (matchByName) targetResId = matchByName.id;
                        }
                      }

                      if (isDevOnly) {
                        story.hasDev = true;
                        if (targetResId) story.devAssigned = targetResId;
                        story.devHours = {
                          analisis: parseFloat(row['Análisis'] || row['Analisis'] || 0) || 0,
                          diseño: parseFloat(row['Diseño'] || row['Diseno'] || 0) || 0,
                          casosPrueba: parseFloat(row['Casos Prueba'] || row['Casos de Prueba'] || 0) || 0,
                          pUnitarias: parseFloat(row['P. Unitarias'] || row['Pruebas Unitarias'] || 0) || 0,
                          desarrollo: parseFloat(row['Desarrollo'] || 0) || 0,
                          documentacion: parseFloat(row['Documentación'] || row['Documentacion'] || 0) || 0
                        };
                      } else {
                        story.hasQa = true;
                        if (targetResId) story.qaAssigned = targetResId;
                        story.qaHours = {
                          planeacion: parseFloat(row['Planeación'] || row['Planeacion'] || 0) || 0,
                          diseño: parseFloat(row['Diseño'] || row['Diseno'] || 0) || 0,
                          ejecucion: parseFloat(row['Ejecución'] || row['Ejecucion'] || 0) || 0,
                          cierre: parseFloat(row['Cierre'] || 0) || 0,
                          entrega: parseFloat(row['Entrega'] || 0) || 0,
                          regresion: parseFloat(row['Regresion'] || row['Regresión'] || 0) || 0
                        };
                      }
                      countMerged++;
                    }
                  });

                  // Reconstruir colas de prioridad de manera segura
                  const devQueues = {};
                  const qaQueues = {};
                  (targetSprint.resources || []).forEach(res => {
                    if (res.role === 'DEV') devQueues[res.id] = [];
                    if (res.role === 'QA') qaQueues[res.id] = [];
                  });

                  targetSprint.userStories.forEach(st => {
                    if (st.hasDev && st.devAssigned && devQueues[st.devAssigned]) {
                      devQueues[st.devAssigned].push(st.id);
                    }
                    if (st.hasQa && st.qaAssigned && qaQueues[st.qaAssigned]) {
                      qaQueues[st.qaAssigned].push(st.id);
                    }
                  });
                  targetSprint.devQueues = devQueues;
                  targetSprint.qaQueues = qaQueues;

                  return { ...prev, [activeSprintId]: targetSprint };
                });

                addLog(`¡Se fusionaron correctamente ${countMerged} HUs del reporte parcial de ${isDevOnly ? 'DEV' : 'QA'}!`);
                showFeedback(`Fusión completada: ${countMerged} historias actualizadas`, 'success');
                return;
              }

              // FLUJO IMPORTACIÓN BASE DE DATOS COMPLETA DE 4 VÍAS
              let activeId = 'Sprint 59';
              let huSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('hus sprint') || n.toLowerCase().includes('hu'));
              let capSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('capacidad') || n.toLowerCase().includes('balance'));
              let devSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('horas dev') || n.toLowerCase().includes('dev'));
              let qaSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('horas qa') || n.toLowerCase().includes('qa'));

              if (!huSheetName) huSheetName = workbook.SheetNames[0];

              const sprintMatch = huSheetName.match(/Sprint\s*(\d+)/i);
              if (sprintMatch) activeId = `Sprint ${sprintMatch[1]}`;

              const parsedSprints = {};
              parsedSprints[activeId] = {
                id: activeId,
                start: '2026-07-27',
                end: '2026-08-12',
                holidays: [],
                resources: [
                  { id: '1', name: 'Briyith Castaño', role: 'DEV', capacity: 8, exceptionStart: '' },
                  { id: '2', name: 'Luis Oviedo', role: 'DEV', capacity: 8, exceptionStart: '' },
                  { id: '3', name: 'Jordan Reyes', role: 'QA', capacity: 4, exceptionStart: '' }
                ],
                userStories: [],
                devQueues: {},
                qaQueues: {},
                dodList: ['Código aprobado', 'Unitarias > 80%', 'Pruebas QA OK', 'Manual Técnico']
              };

              const active = parsedSprints[activeId];

              // Parsear Capacidad-Balance & Parámetros
              if (capSheetName) {
                const sheet = workbook.Sheets[capSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                let foundDev = false;
                let foundQa = false;
                const resourcesList = [];

                rows.forEach((row) => {
                  if (!row || row.length === 0) return;
                  const rowStr = row.map(cell => String(cell || '').trim());

                  if (rowStr[0]?.toLowerCase().includes('inicio')) {
                    const cellVal = row[1];
                    if (cellVal) active.start = parseExcelDate(cellVal);
                  }
                  if (rowStr[0]?.toLowerCase().includes('fin')) {
                    const cellVal = row[1];
                    if (cellVal) active.end = parseExcelDate(cellVal);
                  }
                  if (rowStr[0]?.toLowerCase().includes('dia festivo') || rowStr[0]?.toLowerCase().includes('día festivo')) {
                    const cellVal = row[1];
                    if (cellVal) {
                      const parsedHoli = parseExcelDate(cellVal);
                      if (!active.holidays.includes(parsedHoli)) active.holidays.push(parsedHoli);
                    }
                  }

                  if (rowStr[0]?.toLowerCase().includes('desarrollo')) {
                    foundDev = true; foundQa = false; return;
                  }
                  if (rowStr[0]?.toLowerCase().includes('aseguramiento')) {
                    foundQa = true; foundDev = false; return;
                  }

                  if (foundDev || foundQa) {
                    const colNum = parseInt(rowStr[0]);
                    if (!isNaN(colNum)) {
                      const name = rowStr[1];
                      const role = foundDev ? 'DEV' : 'QA';
                      const id = String(colNum);

                      resourcesList.push({
                        id, name, role, capacity: role === 'DEV' ? 8 : 4, exceptionStart: ''
                      });
                    }
                  }
                });

                if (resourcesList.length > 0) active.resources = resourcesList;
              }

              // Parsear HUs
              if (huSheetName) {
                const sheet = workbook.Sheets[huSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);

                rows.forEach(row => {
                  const id = String(row['ID HU'] || row['ID'] || '').trim();
                  if (!id || id.toLowerCase().includes('total') || id.toLowerCase().includes('orden')) return;

                  const name = row['Nombres de HU'] || row['Historia de Usuario'] || 'Historia de Usuario';
                  const points = parseInt(row['Puntos'] || row['Puntos SP'] || row['SP']) || 3;
                  const personAssigned = String(row['Persona asignada'] || '');
                  const status = row['Estado actual'] || row['Estado Sprint'] || 'Planeada';

                  const personUpper = personAssigned.toUpperCase();
                  const typeCol = String(row['Desarrollo/QA/Regresion'] || row['Tipo'] || '').toUpperCase();

                  let hasDev = false;
                  let hasQa = false;
                  if (typeCol) {
                    if (typeCol.includes('DEV') || typeCol.includes('DESARROLLO')) hasDev = true;
                    if (typeCol.includes('QA') || typeCol.includes('REGRESION') || typeCol.includes('ASEGURAMIENTO')) hasQa = true;
                  } else {
                    hasDev = personUpper.includes('BRIYITH') || personUpper.includes('LUIS') || (!personUpper.includes('JORDAN') && personUpper !== '');
                    hasQa = personUpper.includes('JORDAN') || personUpper.includes('/');
                  }

                  let devAssigned = '';
                  let qaAssigned = '';

                  const parts = personAssigned.split('/');
                  parts.forEach(part => {
                    const cleanPart = part.trim().toUpperCase();
                    const foundDevRes = active.resources.find(r => r.role === 'DEV' && (cleanPart.includes(r.name.toUpperCase().trim()) || r.name.toUpperCase().includes(cleanPart)));
                    if (foundDevRes) devAssigned = foundDevRes.id;

                    const foundQaRes = active.resources.find(r => r.role === 'QA' && (cleanPart.includes(r.name.toUpperCase().trim()) || r.name.toUpperCase().includes(cleanPart)));
                    if (foundQaRes) qaAssigned = foundQaRes.id;
                  });

                  if (!devAssigned && personUpper.includes('BRIYITH')) devAssigned = '1';
                  if (!devAssigned && personUpper.includes('LUIS')) devAssigned = '2';
                  if (!qaAssigned && personUpper.includes('JORDAN')) qaAssigned = '3';

                  active.userStories.push({
                    id,
                    name,
                    points,
                    devAssigned,
                    qaAssigned,
                    hasDev,
                    hasQa,
                    status,
                    delayCategory: '',
                    delayReason: '',
                    dodChecked: [],
                    devHours: { analisis: 0, diseño: 0, casosPrueba: 0, pUnitarias: 0, desarrollo: 0, documentacion: 0 },
                    qaHours: { planeacion: 0, diseño: 0, ejecucion: 0, cierre: 0, entrega: 0, regresion: 0 }
                  });
                });
              }

              // Parsear Horas DEV
              if (devSheetName) {
                const sheet = workbook.Sheets[devSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);
                rows.forEach(row => {
                  const id = String(row['ID HU'] || row['ID'] || '').trim();
                  const story = active.userStories.find(h => h.id === id);
                  if (story) {
                    story.hasDev = true;
                    story.devHours = {
                      analisis: parseFloat(row['Análisis'] || row['Analisis'] || 0) || 0,
                      diseño: parseFloat(row['Diseño'] || row['Diseno'] || 0) || 0,
                      casosPrueba: parseFloat(row['Casos Prueba'] || row['Casos de Prueba'] || 0) || 0,
                      pUnitarias: parseFloat(row['P. Unitarias'] || row['Pruebas Unitarias'] || 0) || 0,
                      desarrollo: parseFloat(row['Desarrollo'] || 0) || 0,
                      documentacion: parseFloat(row['Documentación'] || row['Documentacion'] || 0) || 0
                    };
                  }
                });
              }

              // Parsear Horas QA
              if (qaSheetName) {
                const sheet = workbook.Sheets[qaSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);
                rows.forEach(row => {
                  const id = String(row['ID HU'] || row['ID'] || '').trim();
                  const story = active.userStories.find(h => h.id === id);
                  if (story) {
                    story.hasQa = true;
                    story.qaHours = {
                      planeacion: parseFloat(row['Planeación'] || row['Planeacion'] || 0) || 0,
                      diseño: parseFloat(row['Diseño'] || row['Diseno'] || 0) || 0,
                      ejecucion: parseFloat(row['Ejecución'] || row['Ejecucion'] || 0) || 0,
                      cierre: parseFloat(row['Cierre'] || 0) || 0,
                      entrega: parseFloat(row['Entrega'] || 0) || 0,
                      regresion: parseFloat(row['Regresion'] || row['Regresión'] || 0) || 0
                    };
                  }
                });
              }

              // Reconstruir colas de prioridad
              const devQueues = {};
              const qaQueues = {};

              active.resources.forEach(res => {
                if (res.role === 'DEV') devQueues[res.id] = [];
                if (res.role === 'QA') qaQueues[res.id] = [];
              });

              active.userStories.forEach(story => {
                if (story.hasDev && story.devAssigned) {
                  if (!devQueues[story.devAssigned]) devQueues[story.devAssigned] = [];
                  devQueues[story.devAssigned].push(story.id);
                }
                if (story.hasQa && story.qaAssigned) {
                  if (!qaQueues[story.qaAssigned]) qaQueues[story.qaAssigned] = [];
                  qaQueues[story.qaAssigned].push(story.id);
                }
              });

              active.devQueues = devQueues;
              active.qaQueues = qaQueues;

              setSprints(prev => ({
                ...(prev || {}),
                ...parsedSprints
              }));
              
              setActiveSprintId(activeId);
              addLog(`¡Base de Datos de '${originName}' parseada correctamente de 4 vías con vinculación de recursos!`);
              showFeedback(`Se cargó exitosamente el escenario de ${activeId}`, 'success');

            } catch (err) {
              console.error(err);
              addLog(`Error al estructurar el Excel: ${err.message}`);
              showFeedback("Error leyendo estructura de celdas", "error");
            }
          };

          const parseExcelDate = (excelVal) => {
            if (!excelVal) return '';
            if (excelVal instanceof Date) return excelVal.toISOString().split('T')[0];
            if (typeof excelVal === 'number') {
              const date = new Date(Date.UTC(0, 0, excelVal - 1));
              return date.toISOString().split('T')[0];
            }
            const cleanStr = String(excelVal).trim();
            const match = cleanStr.match(/(\d{4})[-/](\d{2})[-/](\d{2})/);
            if (match) return `${match[1]}-${match[2]}-${match[3]}`;
            return cleanStr;
          };

          const handleLinkLocalExcel = async () => {
            if (!window.showOpenFilePicker) {
              addLog("Su navegador no soporta el Acceso Directo a Archivos. Use la opción de Arrastre Manual.");
              showFeedback("Función no soportada en Safari/Firefox. Use Chrome o Edge.", "error");
              return;
            }
            try {
              const [handle] = await window.showOpenFilePicker({
                types: [{
                  description: 'Archivos de Planeación Ágil (.xlsx)',
                  accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
                }],
                excludeAcceptAllOption: true,
                multiple: false
              });

              setFileHandle(handle);
              setFileNameLinked(handle.name);
              addLog(`Vínculo de flujo directo activo: ${handle.name}`);

              const file = await handle.getFile();
              const reader = new FileReader();
              reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
                parseWorkbookData(workbook, handle.name);
              };
              reader.readAsBinaryString(file);
            } catch (err) {
              addLog(`Vinculación cancelada o fallida: ${err.message}`);
            }
          };

          const handleDirectSyncSave = async () => {
            if (!fileHandle) {
              showFeedback("No hay ningún archivo de SharePoint vinculado. Descargue manualmente.", "error");
              return;
            }
            try {
              addLog("Generando nueva estructura binaria de sobrescritura...");
              const blob = generateExcelBlob();
              const writable = await fileHandle.createWritable();
              await writable.write(blob);
              await writable.close();

              addLog(`🟢 Sincronizado: '${fileHandle.name}' actualizado directamente. OneDrive subirá el cambio.`);
              showFeedback("¡Archivo local actualizado y sincronizado!", "success");
            } catch (err) {
              addLog(`Error de escritura directa: ${err.message}`);
              showFeedback("Permiso de escritura denegado en el archivo local", "error");
            }
          };

          const handleDownloadBackup = () => {
            try {
              const blob = generateExcelBlob();
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `Planning_Database_${activeSprintId}.xlsx`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              
              addLog("Copia de descarga manual generada correctamente.");
              showFeedback("Plantilla descargada. Reemplace en su carpeta OneDrive.", "success");
            } catch (err) {
              showFeedback("Fallo de exportación manual", "error");
            }
          };

          const generateExcelBlob = () => {
            const wb = XLSX.utils.book_new();

            // 1. Capacidad-Balance
            const capData = resourceMetrics.map(r => ({
              "ID Recurso": r.id,
              "Nombre": r.name,
              "Rol": r.role,
              "Horas Disponibles por Día": r.capacity,
              "Capacidad Disponible Total (H)": r.totalCapacityHours,
              "Horas Requeridas Asignadas": r.requiredHours,
              "Balance Horas Remanentes": r.balanceHours,
              "Ocupación %": `${(r.occupationPercent || 0).toFixed(1)}%`,
              "Estado de Ocupación": r.statusText
            }));
            const wsCap = XLSX.utils.json_to_sheet(capData);
            
            const paramsMeta = [
              [],

              } else if (direction === 'down' && index < updatedQueue.length - 1) {

            let current = new Date(start);
            while (current <= end) {

              const isWeekend = day === 0 || day === 6;
              const currentISO = current.toISOString().split('T')[0];
              const isHoliday = checkedHolidays.includes(currentISO);

              current.setDate(current.getDate() + 1);

                        <div className="flex justify-between items-center border-b border-slate-200/60 pb-2">
                          <h4 className="text-xs font-extrabold uppercase text-slate-600 tracking-wide flex items-center gap-1.5">
                            <span className="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                            Festivos de Colombia detectados ({createSprintConfig.detectedHolidays.length})
                          </h4>
                          <span className="text-[10px] font-bold bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-md">Ley Emiliani</span>
                        </div>

                        {createSprintConfig.detectedHolidays.length === 0 ? (
                          <p className="text-xs text-slate-400 italic py-2">No se detectaron festivos nacionales colombianos en este rango de fechas.</p>
                        ) : (
                          <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                            {createSprintConfig.detectedHolidays.map((h) => (
                              <label key={h.date} className="flex items-center justify-between p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-100 transition cursor-pointer">
                                <div className="flex items-center gap-2.5">
                                  <input 
                                    type="checkbox" 
                                    checked={h.checked} 
                                    onChange={() => toggleCreateHolidayChecked(h.date)}
                                    className="rounded text-emerald-600 h-4.5 w-4.5 focus:ring-emerald-500/30"
                                  />
                                  <div className="text-xs">
                                    <span className="font-bold text-slate-800">{h.name}</span>
                                    <span className="text-[10px] text-slate-400 block mt-0.5">{formatFriendlyDate(h.date)}</span>
                                  </div>
                                </div>
                                <span className="text-[9px] font-black text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md">Festivo Oficial</span>
                              </label>
                            ))}
                          </div>
                        )}
                      </div>

                      <div className="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 flex justify-between items-center">
                        <div>
                          <div className="text-xs font-bold text-blue-800">Días Hábiles del Periodo</div>
                          <p className="text-[10px] text-blue-600 mt-0.5">Excluyendo fines de semana y festivos.</p>
                        </div>
                        <span className="text-3xl font-black text-blue-700 bg-blue-100 border border-blue-200 px-4 py-2 rounded-2xl">
                          {createSprintConfig.start && createSprintConfig.end ? previewWorkingDaysCount : 0} d
                        </span>
                      </div>
                    </div>

                    <div className="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                      <button type="button" onClick={() => setIsCreateModalOpen(false)} className="px-5 py-2.5 border border-slate-200 bg-white hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl transition">Cancelar</button>
                      <button type="button" onClick={confirmAndCreateSprint} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm rounded-xl shadow-lg transition flex items-center gap-1.5"><Icons.Check /> Confirmar y Crear</button>
                    </div>
                  </div>
                </div>
              )}

              {}
              {/* MODAL: CREACIÓN / EDICIÓN HU */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-2xl w-full max-h-[90vh] overflow-hidden flex flex-col">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                      <div>
                        <h3 className="font-bold text-slate-900 text-lg">{modalMode === 'add' ? 'Nueva Historia de Usuario' : 'Editar Historia y Configuración DoD'}</h3>
                        <p className="text-xs text-slate-500 mt-1 font-medium">Ajuste de tiempos y controles de calidad para la cascada</p>
                      </div>
                      <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 bg-white border border-slate-200 rounded-full p-1.5 transition">✕</button>
                    </div>

                    <form onSubmit={saveUserStory} className="flex-1 overflow-y-auto p-6 space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">ID Historia *</label>
                          <input type="text" disabled={modalMode === 'edit'} value={huForm.id} onChange={(e) => handleInputChange('id', e.target.value.replace(/\D/g, ''))} className={`w-full border border-slate-200 rounded-xl px-3 py-2 text-sm ${modalMode === 'edit' ? 'bg-slate-100 cursor-not-allowed' : ''}`} placeholder="Ej: 5536" />
                        </div>
                        <div className="md:col-span-2">
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nombre de la Historia *</label>
                          <input type="text" value={huForm.name} onChange={(e) => handleInputChange('name', e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500/20 font-medium" placeholder="Escriba un nombre descriptivo..." />
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Puntos Story (SP)</label>
                          <input type="number" value={huForm.points} onChange={(e) => handleInputChange('points', parseInt(e.target.value) || 0)} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none" min="1" />
                        </div>
                        <div>
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Asignar DEV</label>
                          <select value={huForm.devAssigned} onChange={(e) => handleInputChange('devAssigned', e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white font-medium">
                            <option value="">Seleccione DEV...</option>
                            {activeSprint.resources.filter(r => r && r.role === 'DEV').map(r => <option key={r.id} value={r.id}>{r.name} (ID: {r.id})</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Asignar QA</label>
                          <select value={huForm.qaAssigned} onChange={(e) => handleInputChange('qaAssigned', e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white font-medium">
                            <option value="">Seleccione QA...</option>
                            {activeSprint.resources.filter(r => r && r.role === 'QA').map(r => <option key={r.id} value={r.id}>{r.name} (ID: {r.id})</option>)}
                          </select>
                        </div>
                      </div>

                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-200 space-y-4">
                        <h4 className="text-xs font-bold uppercase text-slate-600 tracking-wider">Estado Actual & Auditoría DoD</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[11px] font-bold uppercase text-slate-500 mb-1">Estado de Ejecución</label>
                            <select value={huForm.status} onChange={(e) => handleInputChange('status', e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white font-medium">
                              <option value="Planeada">Planeada</option>
                              <option value="En Progreso">En Progreso</option>
                              <option value="DoD Compliant (Done)">DoD Compliant (Done)</option>
                              <option value="Retrasada / Bloqueada">Retrasada / Bloqueada</option>
                            </select>
                          </div>
                          <div>
                            <label className="block text-[11px] font-bold uppercase text-slate-500 mb-1">Categoría del Retraso</label>
                            <select value={huForm.delayCategory} onChange={(e) => handleInputChange('delayCategory', e.target.value)} disabled={huForm.status !== 'Retrasada / Bloqueada'} className={`w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white font-medium ${huForm.status !== 'Retrasada / Bloqueada' ? 'bg-slate-100 cursor-not-allowed text-slate-400' : ''}`}>
                              <option value="">Ninguno / Sin retraso</option>
                              <option value="Falta DoD Codigo">Falta de DoD: Revisión de Código</option>
                              <option value="Falta DoD Pruebas">Falta de DoD: Pruebas Unitarias o de Integración</option>
                              <option value="Falta DoD Doc">Falta de DoD: Documentación</option>
                              <option value="Dependencia Externa">Dependencia de Terceros o Proveedores</option>
                              <option value="Incidencia Técnica">Incidencia Técnica / Bug Crítico</option>
                            </select>
                          </div>
                        </div>
                        {huForm.status === 'Retrasada / Bloqueada' && (
                          <div>
                            <label className="block text-[11px] font-bold uppercase text-slate-500 mb-1">Justificación del Retraso (Retrospectiva)</label>
                            <textarea value={huForm.delayReason} onChange={(e) => handleInputChange('delayReason', e.target.value)} className="w-full border border-slate-200 rounded-xl p-2.5 text-xs h-16" placeholder="Describa el motivo o el criterio del DoD que impidió finalizar la historia..." />
                          </div>
                        )}
                      </div>

                      <div className="flex gap-6 border-y border-slate-100 py-4">
                        <label className="flex items-center gap-2 text-sm font-semibold text-slate-700 cursor-pointer">
                          <input type="checkbox" checked={huForm.hasDev} onChange={(e) => handleInputChange('hasDev', e.target.checked)} className="rounded text-blue-600 h-4.5 w-4.5" /> Requiere Esfuerzo DEV
                        </label>
                        <label className="flex items-center gap-2 text-sm font-semibold text-slate-700 cursor-pointer">
                          <input type="checkbox" checked={huForm.hasQa} onChange={(e) => handleInputChange('hasQa', e.target.checked)} className="rounded text-blue-600 h-4.5 w-4.5" /> Requiere Esfuerzo QA
                        </label>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className={`p-4 rounded-xl border ${huForm.hasDev ? 'border-slate-200 bg-slate-50/50' : 'border-slate-100 bg-slate-100/50 opacity-50'}`}>
                          <h4 className="font-bold text-sm text-slate-800 mb-4 flex items-center justify-between">
                            <span>Desglose DEV (Horas)</span>
                            <span className="text-xs font-bold text-blue-600 font-semibold">Total: {Object.values(huForm.devHours || {}).reduce((a, b) => a + Number(b || 0), 0)}h</span>
                          </h4>
                          <div className="grid grid-cols-2 gap-3 text-xs">
                            {['analisis', 'diseño', 'casosPrueba', 'pUnitarias', 'desarrollo', 'documentacion'].map(f => (
                              <div key={f}>
                                <label className="block text-slate-500 mb-1 capitalize">{f === 'casosPrueba' ? 'Casos Prueba' : f === 'pUnitarias' ? 'P. Unitarias' : f}</label>
                                <input type="number" disabled={!huForm.hasDev} value={huForm.devHours?.[f] || 0} onChange={(e) => handleHoursChange('devHours', f, e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 text-center font-bold text-slate-700" />
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className={`p-4 rounded-xl border ${huForm.hasQa ? 'border-slate-200 bg-slate-50/50' : 'border-slate-100 bg-slate-100/50 opacity-50'}`}>
                          <h4 className="font-bold text-sm text-slate-800 mb-4 flex items-center justify-between">
                            <span>Desglose QA (Horas)</span>
                            <span className="text-xs font-bold text-purple-600 font-semibold">Total: {Object.values(huForm.qaHours || {}).reduce((a, b) => a + Number(b || 0), 0)}h</span>
                          </h4>
                          <div className="grid grid-cols-2 gap-3 text-xs">
                            {['planeacion', 'diseño', 'ejecucion', 'cierre', 'entrega', 'regresion'].map(f => (
                              <div key={f}>
                                <label className="block text-slate-500 mb-1 capitalize">{f === 'planeacion' ? 'Planeación' : f === 'regresion' ? 'Regresión' : f}</label>
                                <input type="number" step={f === 'cierre' || f === 'entrega' ? '0.5' : '1'} disabled={!huForm.hasQa} value={huForm.qaHours?.[f] || 0} onChange={(e) => handleHoursChange('qaHours', f, e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 text-center font-bold text-slate-700" />
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </form>

                    <div className="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                      <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl transition">Cancelar</button>
                      <button type="submit" onClick={saveUserStory} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-xl shadow-lg transition flex items-center gap-1"><Icons.Check /> Guardar HU</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL: CREACIÓN / EDICIÓN RECURSO */}
              {isResourceModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full overflow-hidden flex flex-col">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                      <h3 className="font-bold text-slate-900 text-lg">{modalMode === 'add' ? 'Agregar Nuevo Recurso' : 'Editar Recurso de Equipo'}</h3>
                      <button onClick={() => setIsResourceModalOpen(false)} className="text-slate-400 hover:text-slate-600 bg-white border border-slate-200 rounded-full p-1.5 transition">✕</button>
                    </div>

                    <form onSubmit={saveResource} className="p-6 space-y-4">
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-500 mb-1">ID del Recurso (Excel) *</label>
                        <input type="text" disabled={modalMode === 'edit'} value={resourceForm.id} onChange={(e) => setResourceForm(prev => ({ ...prev, id: e.target.value.replace(/\D/g, '') }))} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white font-bold" placeholder="Ej: 4" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nombre Completo *</label>
                        <input type="text" value={resourceForm.name} onChange={(e) => setResourceForm(prev => ({ ...prev, name: e.target.value }))} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white" placeholder="Ej: Diana Prince" />
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Rol Técnico</label>
                          <select value={resourceForm.role} onChange={(e) => setResourceForm(prev => ({ ...prev, role: e.target.value, capacity: e.target.value === 'DEV' ? 8 : 4 }))} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white">
                            <option value="DEV">DEV (Desarrollador)</option>
                            <option value="QA">QA (Asegurador)</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Capacidad Diaria (H)</label>
                          <input type="number" value={resourceForm.capacity} onChange={(e) => setResourceForm(prev => ({ ...prev, capacity: parseInt(e.target.value) || 0 }))} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Inicio Excepcional (Fecha)</label>
                        <input type="date" value={resourceForm.exceptionStart} onChange={(e) => setResourceForm(prev => ({ ...prev, exceptionStart: e.target.value }))} className="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm bg-white" />
                      </div>

                      <div className="pt-4 flex justify-end gap-3 border-t border-slate-100">
                        <button type="button" onClick={() => setIsResourceModalOpen(false)} className="px-4 py-2 border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl transition">Cancelar</button>
                        <button type="submit" className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm rounded-xl shadow-lg transition">Guardar</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* DIÁLOGO DE CONFIRMACIÓN */}
              {confirmState.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full p-6 animate-fade-in">
                    <div className="flex items-center gap-3 text-amber-600 mb-4">
                      <Icons.AlertCircle />
                      <h3 className="font-bold text-slate-900 text-lg">{confirmState.title}</h3>
                    </div>
                    <p className="text-sm text-slate-600 mb-6 leading-relaxed font-medium">{confirmState.message}</p>
                    <div className="flex justify-end gap-3">
                      <button onClick={() => setConfirmState(prev => ({ ...prev, isOpen: false }))} className="px-4 py-2 border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl transition">Cancelar</button>
                      <button onClick={confirmState.onConfirm} className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white font-semibold text-sm rounded-xl shadow-lg transition">Confirmar</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
