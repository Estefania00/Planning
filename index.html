        // Escenario Demo precargado en caso de que quieran explorar sin cargar un archivo inmediatamente
        const demoSprintsData = {
          'Sprint 59': {
            id: 'Sprint 59',
            start: '2026-07-27',
            end: '2026-08-12',
            holidays: ['2026-08-07'],
            resources: [
              { id: '1', name: 'Briyith Castaño', role: 'DEV', capacity: 8, exceptionStart: '' },
              { id: '2', name: 'Luis Oviedo', role: 'DEV', capacity: 8, exceptionStart: '' },
              { id: '3', name: 'Jordan Reyes', role: 'QA', capacity: 4, exceptionStart: '' }
            ],
            userStories: [
              {
                id: '5536',
                name: 'Automatización de Tareas Paralelas',
                points: 13,
                devAssigned: '1',
                qaAssigned: '3',
                hasDev: true,
                hasQa: true,
                status: 'En Progreso',
                delayCategory: '',

                devHours: { analisis: 2, diseño: 2, casosPrueba: 3, pUnitarias: 3, desarrollo: 24, documentacion: 4 },
                qaHours: { planeacion: 2, diseño: 3, ejecucion: 9, cierre: 0.5, entrega: 0.5, regresion: 0 }
              },
              {
                id: '5537',
                name: 'SLAs y Notificaciones Automatizadas',
                points: 8,
                devAssigned: '2',
                qaAssigned: '',

                hasQa: false,
                status: 'En Progreso',
                delayCategory: '',
                delayReason: '',
                dodChecked: [],
                devHours: { analisis: 2, diseño: 2, casosPrueba: 3, pUnitarias: 2, desarrollo: 22, documentacion: 4 },
                qaHours: { planeacion: 0, diseño: 0, ejecucion: 0, cierre: 0, entrega: 0, regresion: 0 }
              },
              {
                id: '5727',
                name: 'Decomiso Operativo Task - Desconexiones',
                points: 8,
                devAssigned: '2',
                qaAssigned: '',
                hasDev: true,
                hasQa: false,
                status: 'En Progreso',
                delayCategory: '',
                delayReason: '',
                dodChecked: [],
                devHours: { analisis: 2, diseño: 2, casosPrueba: 3, pUnitarias: 2, desarrollo: 20, documentacion: 4 },
                qaHours: { planeacion: 0, diseño: 0, ejecucion: 0, cierre: 0, entrega: 0, regresion: 0 }
              }
            ],
            devQueues: { '1': ['5536'], '2': ['5537', '5727'] },
            qaQueues: { '3': ['5536'] },
            dodList: ['Código aprobado', 'Unitarias > 80%', 'Pruebas QA OK', 'Manual Técnico']
          }
        };

        const initialFormState = {
          id: '',
          name: '',
          points: 3,
          devAssigned: '',
          qaAssigned: '',
          hasDev: true,
          hasQa: false,
          status: 'Planeada',
          delayCategory: '',
          delayReason: '',
          dodChecked: [],
          devHours: { analisis: 0, diseño: 0, casosPrueba: 0, pUnitarias: 0, desarrollo: 0, documentacion: 0 },
          qaHours: { planeacion: 0, diseño: 0, ejecucion: 0, cierre: 0, entrega: 0, regresion: 0 }
        };

        function App() {
          const [sprints, setSprints] = useState(() => {
            const saved = localStorage.getItem('SP_PLANNING_PORTAL_STATE');
            return saved ? JSON.parse(saved) : null; // Iniciamos en NULL para forzar la pantalla de carga limpia de Excel
          });

          const [activeSprintId, setActiveSprintId] = useState(() => {
            const savedSprint = localStorage.getItem('SP_PLANNING_PORTAL_ACTIVE_ID');
            return savedSprint || 'Sprint 59';
          });

          const [newHoliday, setNewHoliday] = useState('');
          const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
          const [globalBacklog, setGlobalBacklog] = useState([]);
          const [huForm, setHuForm] = useState(initialFormState);
          const [activeTab, setActiveTab] = useState('consolidado'); 
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [modalMode, setModalMode] = useState('add'); 
          const [editingStoryId, setEditingStoryId] = useState(null);
          const [feedbackMessage, setFeedbackMessage] = useState(null);
          const [feedbackType, setFeedbackType] = useState('success');
          const [syncLogs, setSyncLogs] = useState([]);
          
          // API de Acceso a Archivo Local Directo (File System Access API)
          const [fileHandle, setFileHandle] = useState(null);
          const [fileNameLinked, setFileNameLinked] = useState('');

          useEffect(() => {
            if (sprints) {
              localStorage.setItem('SP_PLANNING_PORTAL_STATE', JSON.stringify(sprints));
              localStorage.setItem('SP_PLANNING_PORTAL_ACTIVE_ID', activeSprintId);
            } else {
              localStorage.removeItem('SP_PLANNING_PORTAL_STATE');
            }
          }, [sprints, activeSprintId]);

          const addLog = (msg) => {
            const time = new Date().toLocaleTimeString();
            setSyncLogs(prev => [`[${time}] ${msg}`, ...prev.slice(0, 49)]);
          };

          const showFeedback = (msg, type = 'success') => {
            setFeedbackMessage(msg);
            setFeedbackType(type);
            setTimeout(() => setFeedbackMessage(null), 3500);
          };

          const activeSprint = useMemo(() => {
            if (!sprints || !sprints[activeSprintId]) {
              return {
                id: activeSprintId, start: '2026-07-27', end: '2026-08-12', holidays: [], resources: [], userStories: [], devQueues: {}, qaQueues: {}, dodList: []
              };
            }
            return sprints[activeSprintId];
          }, [sprints, activeSprintId]);

          // --- CALCULADOR DE CASCADA SECUENCIAL Y GOBERNANZA ---
          const isBusinessDay = (date, holidayList) => {
            const day = date.getDay(); 
            if (day === 0 || day === 6) return false;
            const dateStr = date.toISOString().split('T')[0];
            return !holidayList.includes(dateStr);
          };

          const sprintWorkingDays = useMemo(() => {
            let start = new Date(activeSprint.start + 'T00:00:00');
            let end = new Date(activeSprint.end + 'T00:00:00');
            if (isNaN(start) || isNaN(end) || start > end) return 0;
            
            let count = 0;
            let current = new Date(start);
            while (current <= end) {
              if (isBusinessDay(current, activeSprint.holidays)) count++;
              current.setDate(current.getDate() + 1);
            }
            return count;
          }, [activeSprint]);

          const getNthBusinessDay = (startDateStr, n, holidayList) => {
            if (n <= 0) return startDateStr;
            let currentDate = new Date(startDateStr + 'T00:00:00');
            let count = 0;
            let first = true;
            while (count < n) {
              if (!first) currentDate.setDate(currentDate.getDate() + 1);
              else first = false;
              if (isBusinessDay(currentDate, holidayList)) count++;
            }
            return currentDate.toISOString().split('T')[0];
          };

          const formatFriendlyDate = (dateStr) => {
            if (!dateStr) return 'No definida';
            const date = new Date(dateStr + 'T00:00:00');
            if (isNaN(date)) return dateStr;
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            let formatted = date.toLocaleDateString('es-ES', options);
            return formatted.charAt(0).toUpperCase() + formatted.slice(1);
          };

          const calculatedSchedules = useMemo(() => {
            const devResults = {};
            const qaResults = {};

            activeSprint.resources.filter(r => r.role === 'DEV').forEach(resource => {
              const queue = activeSprint.devQueues[resource.id] || [];
              const resourceHUs = queue.map(id => activeSprint.userStories.find(hu => hu.id === id)).filter(hu => hu && hu.hasDev);

              let cumulativeHours = 0;
              const startFrom = resource.exceptionStart ? resource.exceptionStart : activeSprint.start;

              resourceHUs.forEach((hu) => {
                const totalDevHours = Object.values(hu.devHours).reduce((a, b) => a + Number(b || 0), 0);
                const prevCumulativeDays = Math.ceil(cumulativeHours / resource.capacity);
                cumulativeHours += totalDevHours;
                const totalCumulativeDays = Math.ceil(cumulativeHours / resource.capacity);

                const startDayIndex = prevCumulativeDays + 1;
                const endDayIndex = totalCumulativeDays;

                devResults[hu.id] = {
                  hours: totalDevHours,
                  startDate: getNthBusinessDay(startFrom, startDayIndex, activeSprint.holidays),
                  endDate: getNthBusinessDay(startFrom, endDayIndex, activeSprint.holidays)
                };
              });
            });

            activeSprint.resources.filter(r => r.role === 'QA').forEach(resource => {
              const queue = activeSprint.qaQueues[resource.id] || [];
              const resourceHUs = queue.map(id => activeSprint.userStories.find(hu => hu.id === id)).filter(hu => hu && hu.hasQa);

              let cumulativeHours = 0;
              const startFrom = resource.exceptionStart ? resource.exceptionStart : activeSprint.start;

              resourceHUs.forEach((hu) => {
                const totalQaHours = Object.values(hu.qaHours).reduce((a, b) => a + Number(b || 0), 0);
                const prevCumulativeDays = Math.ceil(cumulativeHours / resource.capacity);
                cumulativeHours += totalQaHours;
                const totalCumulativeDays = Math.ceil(cumulativeHours / resource.capacity);

                const startDayIndex = prevCumulativeDays + 1;
                const endDayIndex = totalCumulativeDays;

                qaResults[hu.id] = {
                  hours: totalQaHours,
                  startDate: getNthBusinessDay(startFrom, startDayIndex, activeSprint.holidays),
                  endDate: getNthBusinessDay(startFrom, endDayIndex, activeSprint.holidays)
                };
              });
            });

            return { dev: devResults, qa: qaResults };
          }, [activeSprint]);

          const consolidatedStories = useMemo(() => {
            return activeSprint.userStories.map(hu => {
              const devSched = calculatedSchedules.dev[hu.id];
              const qaSched = calculatedSchedules.qa[hu.id];

              const totalDevHours = hu.hasDev ? Object.values(hu.devHours).reduce((a, b) => a + Number(b || 0), 0) : 0;
              const totalQaHours = hu.hasQa ? Object.values(hu.qaHours).reduce((a, b) => a + Number(b || 0), 0) : 0;

              let finalDeliveryDate = '';
              if (hu.hasQa && qaSched) finalDeliveryDate = qaSched.endDate;
              else if (hu.hasDev && devSched) finalDeliveryDate = devSched.endDate;

              const totalDodItems = activeSprint.dodList.length;
              const checkedCount = (hu.dodChecked || []).length;
              const dodProgress = totalDodItems > 0 ? Math.round((checkedCount / totalDodItems) * 100) : 0;

              return {
                ...hu,
                totalDevHours,
                totalQaHours,
                devStartDate: devSched ? devSched.startDate : '',
                devEndDate: devSched ? devSched.endDate : '',
                qaStartDate: qaSched ? qaSched.startDate : '',
                qaEndDate: qaSched ? qaSched.endDate : '',
                finalDeliveryDate,
                dodProgress
              };
            });
          }, [activeSprint, calculatedSchedules]);

          const resourceMetrics = useMemo(() => {
            return activeSprint.resources.map(res => {
              const isDev = res.role === 'DEV';
              const totalCapacityHours = sprintWorkingDays * res.capacity;

              let requiredHours = 0;
              if (isDev) {
                requiredHours = consolidatedStories
                  .filter(hu => hu.hasDev && hu.devAssigned === res.id)
                  .reduce((sum, hu) => sum + hu.totalDevHours, 0);
              } else {
                requiredHours = consolidatedStories
                  .filter(hu => hu.hasQa && hu.qaAssigned === res.id)
                  .reduce((sum, hu) => sum + hu.totalQaHours, 0);
              }

              const balanceHours = totalCapacityHours - requiredHours;
              const occupationPercent = totalCapacityHours > 0 ? (requiredHours / totalCapacityHours) * 100 : 0;

              let statusText = 'Con disponibilidad';
              let statusColor = 'bg-emerald-100 text-emerald-800 border-emerald-300';
              let progressColor = 'bg-emerald-50500';

              if (occupationPercent === 100) {
                statusText = 'Al límite (0 dispo)';
                statusColor = 'bg-amber-100 text-amber-800 border-amber-300';
                progressColor = 'bg-amber-500';
              } else if (occupationPercent > 100) {
                statusText = 'Sobrecargado';
                statusColor = 'bg-rose-100 text-rose-800 border-rose-300';
                progressColor = 'bg-rose-500';
              }

              return {
                ...res,
                totalCapacityHours,
                requiredHours,
                balanceHours,
                occupationPercent,
                statusText,
                statusColor,
                progressColor
              };
            });
          }, [activeSprint, consolidatedStories, sprintWorkingDays]);

          // --- MOTOR DE PARSING CORPORATIVO AVANZADO DE EXCEL (.XLSX) ---
          const parseWorkbookData = (workbook, originName = 'Excel') => {
            try {
              const parsedSprints = {};
              let activeId = 'Sprint 59';

              // Encontrar la pestaña de Historias (HUs Sprint XX)
              let huSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('hus sprint') || n.toLowerCase().includes('hu'));
              let capSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('capacidad') || n.toLowerCase().includes('balance'));
              let devSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('horas dev') || n.toLowerCase().includes('dev'));
              let qaSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('horas qa') || n.toLowerCase().includes('qa'));

              if (!huSheetName) {
                // Buscamos cualquier sheet para deducir Sprint
                huSheetName = workbook.SheetNames[0];
              }

              const sprintMatch = huSheetName.match(/Sprint\s*(\d+)/i);
              if (sprintMatch) {
                activeId = `Sprint ${sprintMatch[1]}`;
              }

              // Estructura limpia inicial
              parsedSprints[activeId] = {
                id: activeId,
                start: '2026-07-27',
                end: '2026-08-12',
                holidays: [],
                resources: [
                  { id: '1', name: 'Briyith Castaño', role: 'DEV', capacity: 8, exceptionStart: '' },
                  { id: '2', name: 'Luis Oviedo', role: 'DEV', capacity: 8, exceptionStart: '' },
                  { id: '3', name: 'Jordan Reyes', role: 'QA', capacity: 4, exceptionStart: '' }
                ],
                userStories: [],
                devQueues: {},
                qaQueues: {},
                dodList: ['Código aprobado', 'Unitarias > 80%', 'Pruebas QA OK', 'Manual Técnico']
              };

              const active = parsedSprints[activeId];

              // 1. Parsear Capacidad-Balance & Parámetros
              if (capSheetName) {
                const sheet = workbook.Sheets[capSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                
                let foundDev = false;
                let foundQa = false;
                const resourcesList = [];

                rows.forEach((row, idx) => {
                  if (!row || row.length === 0) return;
                  const rowStr = row.map(cell => String(cell || '').trim());

                  // Detectar Fechas
                  if (rowStr[0]?.toLowerCase().includes('inicio')) {
                    const cellVal = row[1];
                    if (cellVal) active.start = parseExcelDate(cellVal);
                  }
                  if (rowStr[0]?.toLowerCase().includes('fin')) {
                    const cellVal = row[1];
                    if (cellVal) active.end = parseExcelDate(cellVal);
                  }
                  // Detectar Festivos
                  if (rowStr[0]?.toLowerCase().includes('dia festivo') || rowStr[0]?.toLowerCase().includes('día festivo')) {
                    const cellVal = row[1];
                    if (cellVal) {
                      const parsedHoli = parseExcelDate(cellVal);
                      if (!active.holidays.includes(parsedHoli)) active.holidays.push(parsedHoli);
                    }
                  }

                  // Detectar Tabla de Recursos de Desarrollo
                  if (rowStr[0]?.toLowerCase().includes('desarrollo')) {
                    foundDev = true; foundQa = false; return;
                  }
                  // Detectar Tabla de Recursos de Aseguramiento
                  if (rowStr[0]?.toLowerCase().includes('aseguramiento')) {
                    foundQa = true; foundDev = false; return;
                  }

                  // Parsear filas de recursos
                  if (foundDev || foundQa) {
                    const colNum = parseInt(rowStr[0]);
                    if (!isNaN(colNum)) {
                      const name = rowStr[1];
                      const cap = parseFloat(rowStr[2]) || 8;
                      const role = foundDev ? 'DEV' : 'QA';
                      const id = String(colNum + (foundQa ? 10 : 0)); // Evitar colisiones de IDs

                      resourcesList.push({
                        id, name, role, capacity: role === 'DEV' ? 8 : 4, exceptionStart: ''
                      });
                    }
                  }
                });

                if (resourcesList.length > 0) {
                  active.resources = resourcesList;
                }
              }

              // 2. Parsear Historias de Usuario (HUs)
              if (huSheetName) {
                const sheet = workbook.Sheets[huSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);

                rows.forEach(row => {
                  const id = String(row['ID HU'] || '').trim();
                  if (!id || id.toLowerCase().includes('total') || id.toLowerCase().includes('orden')) return;

                  const name = row['Nombres de HU'] || row['Historia de Usuario'] || 'Historia de Usuario';
                  const points = parseInt(row['Puntos'] || row['Puntos SP']) || 3;
                  const personAssigned = String(row['Persona asignada'] || '');
                  const status = row['Estado actual'] || row['Estado Sprint'] || 'Planeada';

                  const hasDev = personAssigned.toUpperCase().includes('Briyith') || personAssigned.toUpperCase().includes('Luis') || !personAssigned.toUpperCase().includes('Jordan');
                  const hasQa = personAssigned.toUpperCase().includes('Jordan') || personAssigned.toUpperCase().includes('/');

                  active.userStories.push({
                    id,
                    name,
                    points,
                    devAssigned: personAssigned.toUpperCase().includes('BRIYITH') ? '1' : personAssigned.toUpperCase().includes('LUIS') ? '2' : '',
                    qaAssigned: personAssigned.toUpperCase().includes('JORDAN') ? '3' : '',
                    hasDev,
                    hasQa,
                    status,
                    delayCategory: '',
                    delayReason: '',
                    dodChecked: [],
                    devHours: { analisis: 0, diseño: 0, casosPrueba: 0, pUnitarias: 0, desarrollo: 0, documentacion: 0 },
                    qaHours: { planeacion: 0, diseño: 0, ejecucion: 0, cierre: 0, entrega: 0, regresion: 0 }
                  });
                });
              }

              // 3. Parsear Horas DEV desglosadas
              if (devSheetName) {
                const sheet = workbook.Sheets[devSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);
                rows.forEach(row => {
                  const id = String(row['ID HU'] || '').trim();
                  const story = active.userStories.find(h => h.id === id);
                  if (story) {
                    story.hasDev = true;
                    story.devHours = {
                      analisis: parseFloat(row['Análisis'] || row['Analisis']) || 0,
                      diseño: parseFloat(row['Diseño'] || row['Diseno']) || 0,
                      casosPrueba: parseFloat(row['Casos Prueba'] || row['Casos de Prueba']) || 0,
                      pUnitarias: parseFloat(row['P. Unitarias'] || row['Pruebas Unitarias']) || 0,
                      desarrollo: parseFloat(row['Desarrollo']) || 0,
                      documentacion: parseFloat(row['Documentación'] || row['Documentacion']) || 0
                    };
                  }
                });
              }

              // 4. Parsear Horas QA desglosadas
              if (qaSheetName) {
                const sheet = workbook.Sheets[qaSheetName];
                const rows = XLSX.utils.sheet_to_json(sheet);
                rows.forEach(row => {
                  const id = String(row['ID HU'] || '').trim();
                  const story = active.userStories.find(h => h.id === id);
                  if (story) {
                    story.hasQa = true;
                    story.qaHours = {
                      planeacion: parseFloat(row['Planeación'] || row['Planeacion']) || 0,
                      diseño: parseFloat(row['Diseño'] || row['Diseno']) || 0,
                      ejecucion: parseFloat(row['Ejecución'] || row['Ejecucion']) || 0,
                      cierre: parseFloat(row['Cierre']) || 0,
                      entrega: parseFloat(row['Entrega']) || 0,
                      regresion: parseFloat(row['Regresion'] || row['Regresión']) || 0
                    };
                  }
                });
              }

              // Reconstruir colas de prioridades iniciales
              const dev1Queue = [];
              const dev2Queue = [];
              const qaQueue = [];

              active.userStories.forEach(story => {
                if (story.hasDev) {
                  if (story.devAssigned === '1') dev1Queue.push(story.id);
                  else if (story.devAssigned === '2') dev2Queue.push(story.id);
                }
                if (story.hasQa && story.qaAssigned === '3') {
                  qaQueue.push(story.id);
                }
              });

              active.devQueues = { '1': dev1Queue, '2': dev2Queue };
              active.qaQueues = { '3': qaQueue };

              setSprints(parsedSprints);
              setActiveSprintId(activeId);
              addLog(`¡Base de Datos de '${originName}' parseada correctamente de 4 vías!`);
              showFeedback(`Se cargó exitosamente el escenario de ${activeId}`, 'success');

            } catch (err) {
              console.error(err);
              addLog(`Error al estructurar el Excel: ${err.message}`);
              showFeedback("Error leyendo estructura de celdas", "error");
            }
          };

          const parseExcelDate = (excelVal) => {
            if (!excelVal) return '';
            if (excelVal instanceof Date) {
              return excelVal.toISOString().split('T')[0];
            }
            if (typeof excelVal === 'number') {
              // Convertir fecha serializada de Excel a ISO
              const date = new Date(Date.UTC(0, 0, excelVal - 1));
              return date.toISOString().split('T')[0];
            }
            const cleanStr = String(excelVal).trim();
            const match = cleanStr.match(/(\d{4})[-/](\d{2})[-/](\d{2})/);
            if (match) return `${match[1]}-${match[2]}-${match[3]}`;
            return cleanStr;
          };

          // --- GESTIÓN DE ARCHIVOS DIRECTO (FILE SYSTEM ACCESS API) ---
          const handleLinkLocalExcel = async () => {
            if (!window.showOpenFilePicker) {
              addLog("Su navegador no soporta el Acceso Directo a Archivos. Use la opción de Arrastre Manual.");
              showFeedback("Función no soportada en Safari/Firefox. Use Chrome o Edge.", "error");
              return;
            }

            try {
              const [handle] = await window.showOpenFilePicker({
                types: [{
                  description: 'Archivos de Planeación Ágil (.xlsx)',
                  accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
                }],
                excludeAcceptAllOption: true,
                multiple: false
              });

              setFileHandle(handle);
              setFileNameLinked(handle.name);
              addLog(`Vínculo de flujo directo activo: ${handle.name}`);

              const file = await handle.getFile();
              const reader = new FileReader();
              reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
                parseWorkbookData(workbook, handle.name);
              };
              reader.readAsBinaryString(file);

            } catch (err) {
              addLog(`Vinculación cancelada o fallida: ${err.message}`);
            }
          };

          // Sobrescribe directamente el archivo local vinculado sin descargar duplicados
          const handleDirectSyncSave = async () => {
            if (!fileHandle) {
              showFeedback("No hay ningún archivo de SharePoint vinculado. Descargue manualmente.", "error");
              return;
            }

            try {
              addLog("Generando nueva estructura binaria de sobrescritura...");
              const blob = generateExcelBlob();

              const writable = await fileHandle.createWritable();
              await writable.write(blob);
              await writable.close();

              addLog(`🟢 Sincronizado: '${fileHandle.name}' actualizado directamente. OneDrive subirá el cambio.`);
              showFeedback("¡Archivo local actualizado y sincronizado!", "success");
            } catch (err) {
              addLog(`Error de escritura directa: ${err.message}`);
              showFeedback("Permiso de escritura denegado en el archivo local", "error");
            }
          };

          // --- FLUJO ALTERNATIVO DE DESCARGA ---
          const handleDownloadBackup = () => {
            try {
              const blob = generateExcelBlob();
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `Planning_Database_${activeSprintId}.xlsx`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              
              addLog("Copia de descarga manual generada correctamente.");
              showFeedback("Plantilla descargada. Reemplace en su carpeta OneDrive.", "success");
            } catch (err) {
              showFeedback("Fallo de exportación manual", "error");
            }
          };

          const generateExcelBlob = () => {
            const wb = XLSX.utils.book_new();
            const sprintTag = activeSprintId.replace(/\s+/g, '_');

            // 1. Capacidad-Balance
            const capData = resourceMetrics.map(r => ({
              "Nombre": r.name,
              "Rol": r.role,
              "Horas Disponibles por Día": r.capacity,
              "Capacidad Disponible Total (H)": r.totalCapacityHours,
              "Horas Requeridas Asignadas": r.requiredHours,
              "Balance Horas Remanentes": r.balanceHours,
              "Ocupación %": `${r.occupationPercent.toFixed(1)}%`,
              "Estado de Ocupación": r.statusText
            }));
            const wsCap = XLSX.utils.json_to_sheet(capData);
            
            // Inyectar metadatos en las filas inferiores de Capacidad-Balance
            const paramsMeta = [
              [],
              ["Disponibilidad QA-Hrs", 4],
              ["Disponibilidad DEV-Hrs", 8],
              ["Dias del Sprint", sprintWorkingDays],
              ["Inicio", activeSprint.start],
              ["Fin", activeSprint.end],
              ["Cantidad de festivos", activeSprint.holidays.length]
            ];
            activeSprint.holidays.forEach((d, i) => {
              paramsMeta.push([`Dia festivo ${i + 1}`, d]);
            });
            XLSX.utils.sheet_add_aoa(wsCap, paramsMeta, { origin: -1 });
            XLSX.utils.book_append_sheet(wb, wsCap, `Capacidad-Balance`);

            // 2. Horas DEV
            const devRows = consolidatedStories.filter(h => h.hasDev).map(h => ({
              "ID HU": h.id,
              "Historia": h.name,
              "Desarrollador Asignado": activeSprint.resources.find(r => r.id === h.devAssigned)?.name || 'Sin Asignar',
              "Análisis": h.devHours.analisis,
              "Diseño": h.devHours.diseño,
              "Casos Prueba": h.devHours.casosPrueba,
              "P. Unitarias": h.devHours.pUnitarias,
              "Desarrollo": h.devHours.desarrollo,
              "Documentación": h.devHours.documentacion,
              "Total h DEV": h.totalDevHours,
              "Fecha estimada FIN": h.devEndDate
            }));
            const wsDev = XLSX.utils.json_to_sheet(devRows);
            XLSX.utils.book_append_sheet(wb, wsDev, `Horas_DEV`);

            // 3. Horas QA
            const qaRows = consolidatedStories.filter(h => h.hasQa).map(h => ({
              "ID HU": h.id,
              "Historia": h.name,
              "Asegurador Asignado": activeSprint.resources.find(r => r.id === h.qaAssigned)?.name || 'Sin Asignar',
              "Planeación": h.qaHours.planeacion,
              "Diseño": h.qaHours.diseño,
              "Ejecución": h.qaHours.ejecucion,
              "Cierre": h.qaHours.cierre,
              "Entrega": h.qaHours.entrega,
              "Regresion": h.qaHours.regresion,
              "Total QA": h.totalQaHours,
              "Fecha Estimada FIN": h.qaEndDate
            }));
            const wsQa = XLSX.utils.json_to_sheet(qaRows);
            XLSX.utils.book_append_sheet(wb, wsQa, `Horas_QA`);

            // 4. HUs Sprint
            const consData = consolidatedStories.map(h => ({
              "ID HU": h.id,
              "Desarrollo/QA/Regresion": h.hasDev && h.hasQa ? 'Desarrollo+QA' : h.hasDev ? 'Desarrollo' : 'QA',
              "Nombres de HU": h.name,
              "Puntos": h.points,
              "Persona asignada": [
                activeSprint.resources.find(r => r.id === h.devAssigned)?.name,
                activeSprint.resources.find(r => r.id === h.qaAssigned)?.name
              ].filter(Boolean).join(' / '),
              "Horas DEV": h.totalDevHours,
              "Horas QA": h.totalQaHours,
              "Total Horas": h.totalDevHours + h.totalQaHours,
              "DoD Requerido": activeSprint.dodList.join(', '),
              "Estado actual": h.status || 'Planeada',
              "Fecha de entrega a qa": h.hasDev ? h.devEndDate : ''
            }));
            const wsCons = XLSX.utils.json_to_sheet(consData);
            XLSX.utils.book_append_sheet(wb, wsCons, `HUs_${activeSprintId}`);

            const excelBuf = XLSX.write(wb, { bookType: 'xlsx', type: 'binary' });
            const buf = new ArrayBuffer(excelBuf.length);
            const view = new Uint8Array(buf);
            for (let i = 0; i < excelBuf.length; i++) view[i] = excelBuf.charCodeAt(i) & 0xFF;
            return new Blob([buf], { type: 'application/octet-stream' });
          };

          const handleDragOver = (e) => e.preventDefault();

          const handleDropExcel = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file) return;

            addLog(`Lectura por arrastre: ${file.name}...`);
            const reader = new FileReader();
            reader.onload = (evt) => {
              const workbook = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
              parseWorkbookData(workbook, file.name);
            };
            reader.readAsBinaryString(file);
          };

          // --- MANEJO DE HISTORIAS Y PARÁMETROS INTERNOS ---
          const handleSprintChange = (sprintId) => {
            setActiveSprintId(sprintId);
            showFeedback(`Cambiado al ${sprintId} correctamente`, 'success');
          };

          const createNewSprint = () => {
            const nextSprintNum = parseInt(activeSprintId.replace('Sprint ', '')) + 1;
            const newSprintName = `Sprint ${nextSprintNum}`;
            const inheritedResources = activeSprint.resources.map(r => ({ ...r, exceptionStart: '' }));

            const nextSprintData = {
              id: newSprintName, start: '2026-08-17', end: '2026-09-02', holidays: [], resources: inheritedResources, userStories: [], devQueues: {}, qaQueues: {}, dodList: [...activeSprint.dodList]
            };

            setSprints(prev => ({ ...prev, [newSprintName]: nextSprintData }));
            setActiveSprintId(newSprintName);
            showFeedback(`¡Se ha creado el ${newSprintName} con éxito!`, 'success');
          };

          const sendToBacklog = (story) => {
            setGlobalBacklog(prev => {
              if (prev.some(hu => hu.id === story.id)) return prev;
              return [...prev, {
                id: story.id, name: story.name, points: story.points, hasDev: story.hasDev, hasQa: story.hasQa, devHours: { ...story.devHours }, qaHours: { ...story.qaHours }
              }];
            });

            setSprints(prev => {
              const updatedSprint = { ...prev[activeSprintId] };
              updatedSprint.userStories = updatedSprint.userStories.filter(hu => hu.id !== story.id);
              Object.keys(updatedSprint.devQueues).forEach(resId => {
                updatedSprint.devQueues[resId] = updatedSprint.devQueues[resId].filter(id => id !== story.id);
              });
              Object.keys(updatedSprint.qaQueues).forEach(resId => {
                updatedSprint.qaQueues[resId] = updatedSprint.qaQueues[resId].filter(id => id !== story.id);
              });
              return { ...prev, [activeSprintId]: updatedSprint };
            });

            showFeedback(`La HU #${story.id} se movió al Backlog Global`, 'success');
          };

          const integrateFromBacklog = (storyId) => {
            const backlogHu = globalBacklog.find(hu => hu.id === storyId);
            if (!backlogHu) return;

            setSprints(prev => {
              const updatedSprint = { ...prev[activeSprintId] };
              const newSprintHu = { ...backlogHu, devAssigned: '', qaAssigned: '', status: 'Planeada', delayCategory: '', delayReason: '', dodChecked: [] };
              updatedSprint.userStories.push(newSprintHu);
              return { ...prev, [activeSprintId]: updatedSprint };
            });

            setGlobalBacklog(prev => prev.filter(hu => hu.id !== storyId));
            showFeedback(`HU #${storyId} integrada al ${activeSprintId}`, 'success');
            setActiveTab('consolidado');
          };

          const moveTaskInQueue = (resourceId, role, index, direction) => {
            setSprints(prev => {
              const sprint = { ...prev[activeSprintId] };
              const isDev = role === 'DEV';
              const queueKey = isDev ? 'devQueues' : 'qaQueues';
              const originalQueue = sprint[queueKey]?.[resourceId] || [];
              const updatedQueue = [...originalQueue];

              if (direction === 'up' && index > 0) {
                const temp = updatedQueue[index];
                updatedQueue[index] = updatedQueue[index - 1];
                updatedQueue[index - 1] = temp;
              } else if (direction === 'down' && index < updatedQueue.length - 1) {
                const temp = updatedQueue[index];
                updatedQueue[index] = updatedQueue[index + 1];
                updatedQueue[index + 1] = temp;
              }

              sprint[queueKey] = { ...(sprint[queueKey] || {}), [resourceId]: updatedQueue };
              return { ...prev, [activeSprintId]: sprint };
            });
            showFeedback('Prioridad reordenada y cascada recalculada', 'success');
          };

          const handleInputChange = (field, val) => {
            setHuForm(prev => ({ ...prev, [field]: val }));
          };

          const handleHoursChange = (group, field, val) => {
            const numericVal = isNaN(parseFloat(val)) ? 0 : parseFloat(val);
            setHuForm(prev => ({ ...prev, [group]: { ...prev[group], [field]: numericVal } }));
          };

          const handleOpenAddModal = () => {
            setHuForm({ ...initialFormState, dodChecked: [] });
            setModalMode('add');
            setIsModalOpen(true);
          };

          const handleOpenEditModal = (hu) => {
            setHuForm({
              id: hu.id, name: hu.name, points: hu.points, devAssigned: hu.devAssigned || '', qaAssigned: hu.qaAssigned || '', hasDev: hu.hasDev, hasQa: hu.hasQa, status: hu.status || 'Planeada', delayCategory: hu.delayCategory || '', delayReason: hu.delayReason || '', dodChecked: hu.dodChecked || [], devHours: { ...hu.devHours }, qaHours: { ...hu.qaHours }
            });
            setEditingStoryId(hu.id);
            setModalMode('edit');
            setIsModalOpen(true);
          };

          const toggleDodItem = (storyId, item) => {
            setSprints(prev => {
              const sprint = { ...prev[activeSprintId] };
              sprint.userStories = sprint.userStories.map(hu => {
                if (hu.id !== storyId) return hu;
                const currentChecked = hu.dodChecked || [];
                const updatedChecked = currentChecked.includes(item) ? currentChecked.filter(i => i !== item) : [...currentChecked, item];
                return { ...hu, dodChecked: updatedChecked };
              });
              return { ...prev, [activeSprintId]: sprint };
            });
          };

          const saveUserStory = (e) => {
            e.preventDefault();
            if (!huForm.id.trim()) return showFeedback('ID requerido', 'error');
            if (!huForm.name.trim()) return showFeedback('Nombre requerido', 'error');

            const sprint = sprints[activeSprintId];
            if (modalMode === 'add' && sprint.userStories.some(hu => hu.id === huForm.id)) {
              return showFeedback(`El ID #${huForm.id} ya se encuentra asignado`, 'error');
            }

            setSprints(prev => {
              const active = { ...prev[activeSprintId] };
              if (modalMode === 'add') {
                active.userStories.push(huForm);
                if (huForm.hasDev && huForm.devAssigned) {
                  active.devQueues[huForm.devAssigned] = [...(active.devQueues[huForm.devAssigned] || []), huForm.id];
                }
                if (huForm.hasQa && huForm.qaAssigned) {
                  active.qaQueues[huForm.qaAssigned] = [...(active.qaQueues[huForm.qaAssigned] || []), huForm.id];
                }
              } else {
                const oldStory = active.userStories.find(hu => hu.id === editingStoryId);
                active.userStories = active.userStories.map(hu => hu.id === editingStoryId ? huForm : hu);

                if (oldStory.devAssigned !== huForm.devAssigned || !huForm.hasDev) {
                  if (oldStory.devAssigned) active.devQueues[oldStory.devAssigned] = (active.devQueues[oldStory.devAssigned] || []).filter(id => id !== editingStoryId);
                  if (huForm.hasDev && huForm.devAssigned) active.devQueues[huForm.devAssigned] = [...(active.devQueues[huForm.devAssigned] || []).filter(id => id !== huForm.id), huForm.id];
                }

                if (oldStory.qaAssigned !== huForm.qaAssigned || !huForm.hasQa) {
                  if (oldStory.qaAssigned) active.qaQueues[oldStory.qaAssigned] = (active.qaQueues[oldStory.qaAssigned] || []).filter(id => id !== editingStoryId);
                  if (huForm.hasQa && huForm.qaAssigned) active.qaQueues[huForm.qaAssigned] = [...(active.qaQueues[huForm.qaAssigned] || []).filter(id => id !== huForm.id), huForm.id];
                }
              }
              return { ...prev, [activeSprintId]: active };
            });

            setIsModalOpen(false);
            showFeedback('Historia de usuario guardada con éxito', 'success');
          };

          const triggerDeleteConfirm = (id) => {
            setConfirmState({
              isOpen: true, title: 'Eliminar Historia de Usuario', message: `¿Está seguro de que desea eliminar la HU #${id}?`,
              onConfirm: () => {
                setSprints(prev => {
                  const sprint = { ...prev[activeSprintId] };
                  sprint.userStories = sprint.userStories.filter(hu => hu.id !== id);
                  Object.keys(sprint.devQueues).forEach(key => {
                    sprint.devQueues[key] = (sprint.devQueues[key] || []).filter(qid => qid !== id);
                  });
                  Object.keys(sprint.qaQueues).forEach(key => {
                    sprint.qaQueues[key] = (sprint.qaQueues[key] || []).filter(qid => qid !== id);
                  });
                  return { ...prev, [activeSprintId]: sprint };
                });
                showFeedback('Historia de usuario eliminada', 'success');
                setConfirmState(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          const triggerDiscardBacklogConfirm = (id) => {
            setConfirmState({
              isOpen: true, title: 'Descartar del Backlog', message: `¿Eliminar la HU #${id} del backlog?`,
              onConfirm: () => {
                setGlobalBacklog(prev => prev.filter(hu => hu.id !== id));
                showFeedback('Eliminada del backlog', 'success');
                setConfirmState(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          const triggerAppResetConfirm = () => {
            setConfirmState({
              isOpen: true, title: 'Limpiar Memoria de la App (Reset de Fábrica)', message: '¿Formatear la aplicación para un nuevo proyecto o empresa? Se eliminará todo el histórico actual del navegador de forma segura.',
              onConfirm: () => {
                setSprints(null);
                setGlobalBacklog([]);
                setSyncLogs([]);
                setFileHandle(null);
                setFileNameLinked('');
                localStorage.removeItem('SP_PLANNING_PORTAL_STATE');
                showFeedback("Memoria formateada correctamente", "success");
                setConfirmState(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          // --- VISTA DE BIENVENIDA / INGESTA ---
          if (!sprints) {
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col justify-center items-center p-6 text-white">
                <div className="max-w-xl w-full bg-slate-800 rounded-3xl p-8 border border-slate-700/60 shadow-2xl space-y-8 animate-fade-in text-center">
                  
                  <div className="flex flex-col items-center space-y-3">
                    <div className="bg-emerald-600/20 text-emerald-400 p-4 rounded-2xl border border-emerald-500/30">

                          <div className="grid grid-cols-2 gap-3 text-xs">
                            {['analisis', 'diseño', 'casosPrueba', 'pUnitarias', 'desarrollo', 'documentacion'].map(f => (
                              <div key={f}>
                                <label className="block text-slate-500 mb-1 capitalize">{f === 'casosPrueba' ? 'Casos Prueba' : f === 'pUnitarias' ? 'P. Unitarias' : f}</label>
                                <input type="number" disabled={!huForm.hasDev} value={huForm.devHours[f]} onChange={(e) => handleHoursChange('devHours', f, e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 text-center font-bold text-slate-700" />
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className={`p-4 rounded-xl border ${huForm.hasQa ? 'border-slate-200 bg-slate-50/50' : 'border-slate-100 bg-slate-100/50 opacity-50'}`}>
                          <h4 className="font-bold text-sm text-slate-800 mb-4 flex items-center justify-between">
                            <span>Desglose QA (Horas)</span>
                            <span className="text-xs font-bold text-purple-600 font-semibold">Total: {Object.values(huForm.qaHours).reduce((a, b) => a + Number(b || 0), 0)}h</span>
                          </h4>
                          <div className="grid grid-cols-2 gap-3 text-xs">
                            {['planeacion', 'diseño', 'ejecucion', 'cierre', 'entrega', 'regresion'].map(f => (
                              <div key={f}>
                                <label className="block text-slate-500 mb-1 capitalize">{f === 'planeacion' ? 'Planeación' : f === 'regresion' ? 'Regresión' : f}</label>
                                <input type="number" step={f === 'cierre' || f === 'entrega' ? '0.5' : '1'} disabled={!huForm.hasQa} value={huForm.qaHours[f]} onChange={(e) => handleHoursChange('qaHours', f, e.target.value)} className="w-full border border-slate-200 rounded-lg p-1.5 text-center font-bold text-slate-700" />
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </form>

                    <div className="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                      <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl transition">Cancelar</button>
                      <button type="submit" onClick={saveUserStory} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm rounded-xl shadow-lg transition flex items-center gap-1"><Icons.Check /> Guardar HU</button>
                    </div>
                  </div>
                </div>
              )}

              {/* DIÁLOGO DE CONFIRMACIÓN */}
              {confirmState.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 max-w-md w-full p-6 animate-fade-in">
                    <div className="flex items-center gap-3 text-amber-600 mb-4">
                      <Icons.AlertCircle />
                      <h3 className="font-bold text-slate-900 text-lg">{confirmState.title}</h3>
                    </div>
                    <p className="text-sm text-slate-600 mb-6 leading-relaxed font-medium">{confirmState.message}</p>
                    <div className="flex justify-end gap-3">
                      <button onClick={() => setConfirmState(prev => ({ ...prev, isOpen: false }))} className="px-4 py-2 border border-slate-200 hover:bg-slate-100 text-slate-700 font-semibold text-sm rounded-xl transition">Cancelar</button>
                      <button onClick={confirmState.onConfirm} className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white font-semibold text-sm rounded-xl shadow-lg transition">Confirmar</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
